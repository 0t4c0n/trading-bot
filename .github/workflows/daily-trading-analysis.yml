# .github/workflows/daily-trading-analysis.yml
name: Wyckoff Spring Analysis Diario

on:
  schedule:
    # 06:00 UTC, Martes a Sábado UTC = sesiones Lunes a Viernes US.
    # 9-10h después del cierre del mercado US (NYSE cierra a 21:00 UTC en
    # invierno / 20:00 UTC en verano DST) → máxima fiabilidad de la vela
    # diaria definitiva en yfinance.
    # En España: 07:00 (invierno CET) / 08:00 (verano CEST) — dashboard listo
    # cada mañana al despertar.
    - cron: '0 6 * * 2-6'
  workflow_dispatch:  # Permitir ejecución manual

# PERMISOS NECESARIOS PARA GITHUB PAGES
permissions:
  contents: write
  pages: write
  id-token: write

# Solo un workflow simultáneo
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  wyckoff-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 horas máximo

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python y caché de dependencias
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar análisis Wyckoff Spring
      run: |
        echo "=== WYCKOFF SPRING SCREENER ==="
        echo "Estrategia: Swing Trading Macro | Temporalidad: Diario (1D)"
        echo "Metodología: Fase C Wyckoff + Volume Profile (VPVR)"
        echo "Filtro de mercado: S&P 500 vs MA200"
        echo "Universo: NYSE + NASDAQ"
        python script_automated.py
      env:
        PYTHONUNBUFFERED: 1

    - name: Generar JSON del dashboard
      run: |
        echo "Generando dashboard Wyckoff con scoring dual (Probabilidad + Potencial)..."
        python create_dashboard_data.py

    - name: Verificar archivos generados
      id: verify_data_file
      run: |
        echo "Verificando docs/data.json..."
        if [ ! -f docs/data.json ] || [ $(stat -c%s docs/data.json) -lt 200 ]; then
          echo "::error::docs/data.json no se generó correctamente o está casi vacío."
          exit 1
        fi
        echo "✓ data.json OK. Tamaño: $(stat -c%s docs/data.json) bytes."

    - name: Configurar Pages
      uses: actions/configure-pages@v4

    - name: Subir artefacto de Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'

    - name: Desplegar a GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Resumen final
      run: |
        echo "=== WYCKOFF SPRING ANALYSIS COMPLETADO ==="
        echo "🎯 Metodología: Fase C Wyckoff + Volume Profile (VPVR)"
        echo "📊 Scoring: Probabilidad (0-60) + Potencial (0-40) = Total (0-100)"
        echo "🛡️ SL con margen ATR anti-volatilidad"
        echo "🚀 Dashboard: ${{ steps.deployment.outputs.page_url }}"
        echo "⏰ Próxima ejecución: mañana a la misma hora"
