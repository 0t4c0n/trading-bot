<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum Screener - Líderes en Pullback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --text: #1a202c;
            --muted: #64748b;
            --border: #e2e8f0;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.5;
        }

        .container {
            max-width: 560px;
            margin: 10px auto;
        }

        .header {
            background: var(--card);
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

        .header h1 {
            font-size: 1.25em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 0.85em;
            color: var(--muted);
        }

        .market-banner {
            background: var(--card);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--green);
        }

        .market-banner.bearish { border-left-color: var(--red); }

        .market-banner .label {
            font-size: 0.75em;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .market-banner .status {
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .market-banner .desc {
            font-size: 0.82em;
            color: var(--muted);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .summary-card {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .summary-card .value {
            font-size: 1.6em;
            font-weight: 700;
            color: var(--blue);
            line-height: 1.1;
        }

        .summary-card .label {
            font-size: 0.72em;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 4px;
        }

        .summary-card.warn .value { color: var(--orange); }
        .summary-card.danger .value { color: var(--red); }

        .stale-warning {
            background: #fef3c7;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 0.82em;
            color: #78350f;
            border-left: 3px solid var(--orange);
        }

        .section-title {
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 10px;
            padding-left: 4px;
        }

        .pick-card {
            background: var(--card);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--border);
        }

        .pick-card.test-active   { border-left-color: var(--green); }
        .pick-card.test-done     { border-left-color: var(--blue); }

        .pick-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .pick-rank {
            display: inline-block;
            background: var(--blue);
            color: white;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 8px;
            margin-right: 8px;
            font-weight: 700;
            vertical-align: middle;
        }

        .pick-symbol {
            font-size: 1.15em;
            font-weight: 700;
            display: inline-block;
        }

        .pick-company {
            font-size: 0.75em;
            color: var(--muted);
            margin-top: 2px;
        }

        .pick-price {
            font-size: 1.05em;
            font-weight: 700;
            text-align: right;
        }

        .pick-sector {
            font-size: 0.7em;
            color: var(--muted);
            text-align: right;
            margin-top: 2px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.74em;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-badge.test-active { background: #d1fae5; color: #065f46; }
        .status-badge.test-done   { background: #dbeafe; color: #1e40af; }

        .score-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-top: 12px;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .score-cell {
            text-align: center;
        }

        .score-cell .v {
            font-size: 1.1em;
            font-weight: 700;
        }

        .score-cell .v.total { color: var(--blue); font-size: 1.3em; }
        .score-cell .v.prob  { color: var(--green); }
        .score-cell .v.pot   { color: var(--purple); }

        .score-cell .l {
            font-size: 0.65em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .levels-grid, .risk-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            font-size: 0.82em;
        }

        .kv {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .kv .k {
            color: var(--muted);
        }

        .kv .v {
            font-weight: 600;
        }

        .kv .v.sl  { color: var(--red); }
        .kv .v.tp  { color: var(--green); }
        .kv .v.atr { color: var(--purple); }

        .risk-explanation {
            font-size: 0.7em;
            color: var(--muted);
            margin-top: 6px;
            font-style: italic;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.78em;
            padding: 3px 0;
        }

        .detail-row .k { color: var(--muted); }
        .detail-row .v { font-weight: 600; }
        .detail-row .v.green { color: var(--green); }
        .detail-row .v.red   { color: var(--red); }

        .section-subtitle {
            font-size: 0.72em;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 12px;
            margin-bottom: 4px;
            padding-bottom: 3px;
            border-bottom: 1px solid var(--border);
        }

        .footer {
            text-align: center;
            font-size: 0.75em;
            color: var(--muted);
            margin: 20px 0 10px;
            padding: 14px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .footer .strategy {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .no-data {
            background: var(--card);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

        .no-data .icon { font-size: 2.4em; margin-bottom: 10px; }
        .no-data .title { font-weight: 700; font-size: 1.05em; margin-bottom: 6px; }
        .no-data .desc { font-size: 0.82em; color: var(--muted); }

        @media (max-width: 380px) {
            .summary-grid { grid-template-columns: 1fr; }
            .levels-grid, .risk-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Momentum Screener</h1>
            <div class="subtitle">Líderes en pullback a la MA50 · Diario · Solo mercado alcista</div>
        </div>

        <div id="content" class="loading">Cargando datos...</div>

        <div class="footer" id="footer-content"></div>
    </div>

    <script>
    async function loadDashboard() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            const data = await resp.json();
            render(data);
        } catch (err) {
            document.getElementById('content').innerHTML =
                `<div class="no-data"><div class="icon">❌</div>
                <div class="title">Error cargando datos</div>
                <div class="desc">${err.message}</div></div>`;
        }
    }

    function fmt(v, dec = 2) {
        if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
        return Number(v).toFixed(dec);
    }

    function fmtPrice(v) {
        if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
        return '$' + Number(v).toFixed(2);
    }

    function fmtPct(v) {
        if (v === null || v === undefined || isNaN(v)) return '—';
        return Number(v).toFixed(2) + '%';
    }

    function render(data) {
        const m = data.market_context || {};
        const s = data.summary || {};
        const picks = data.top_picks || [];

        const marketHtml = `
            <div class="market-banner ${m.healthy ? '' : 'bearish'}">
                <div class="label">Estado del mercado (S&P 500 vs MA200)</div>
                <div class="status">${m.status_label || '—'}</div>
                <div class="desc">${m.description || ''}</div>
            </div>`;

        const summaryHtml = `
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="value">${s.picks || 0}</div>
                    <div class="label">Picks operables</div>
                </div>
                <div class="summary-card">
                    <div class="value">${s.leaders || 0}</div>
                    <div class="label">Líderes (RS≥80)</div>
                </div>
                <div class="summary-card">
                    <div class="value">${s.total_analyzed || 0}</div>
                    <div class="label">Analizadas</div>
                </div>
            </div>`;

        let picksHtml;
        if (!m.healthy) {
            picksHtml = `<div class="no-data">
                <div class="icon">⚠️</div>
                <div class="title">Mercado bajista — a liquidez</div>
                <div class="desc">El SPY está bajo su MA200. La estrategia de momentum NO opera en bear markets (es donde más drawdown sufre). Espera a que el mercado recupere su tendencia alcista.</div>
            </div>`;
        } else if (picks.length === 0) {
            picksHtml = `<div class="no-data">
                <div class="icon">📊</div>
                <div class="title">Sin líderes en pullback hoy</div>
                <div class="desc">${s.total_analyzed || 0} acciones analizadas. Ningún líder está hoy en un punto de entrada (rebote en MA50). Vuelve mañana.</div>
            </div>`;
        } else {
            picksHtml = '<div class="section-title">🔝 Líderes en pullback (' + picks.length + ')</div>' +
                picks.map(p => renderPick(p)).join('');
        }

        document.getElementById('content').innerHTML = marketHtml + summaryHtml + picksHtml;

        const now = new Date(data.timestamp || Date.now());
        const cr = data.criteria || {};
        document.getElementById('footer-content').innerHTML = `
            <div class="strategy">${data.strategy || 'Momentum / Fuerza Relativa'}</div>
            <div>${cr.selection || 'Líderes RS top 20% en tendencia alcista, cerca de máximos'}</div>
            <div>Entrada: ${cr.entry || 'rebote en MA50'} · Salida: dejar correr con trailing stop</div>
            <div style="margin-top:8px;">Actualizado: ${now.toLocaleString('es-ES')}</div>
        `;
    }

    function renderPick(p) {
        const r = p.relative_strength || {};
        const tr = p.trend || {};
        const rm = p.risk_management || {};
        const rsClass = (r.rs_rating >= 90) ? 'test-active' : '';

        return `
            <div class="pick-card ${rsClass}">
                <div class="pick-header">
                    <div>
                        <span class="pick-rank">#${p.rank}</span>
                        <span class="pick-symbol">${p.symbol}</span>
                        <div class="pick-company">RS ${fmt(r.rs_rating, 0)}/100 · ${r.label || 'Líder'}</div>
                    </div>
                    <div>
                        <div class="pick-price">${fmtPrice(p.price)}</div>
                        <div class="pick-sector">${fmt(tr.pct_from_52w_high, 0)}% del máx 52s</div>
                    </div>
                </div>

                <div class="status-badge test-active">📈 Líder en pullback a MA50</div>

                <div class="section-subtitle">Tendencia</div>
                <div class="detail-row"><span class="k">Precio</span><span class="v">${fmtPrice(p.price)}</span></div>
                <div class="detail-row"><span class="k">MA50 (soporte del pullback)</span><span class="v">${fmtPrice(tr.ma50)}</span></div>
                <div class="detail-row"><span class="k">MA200 (tendencia de fondo)</span><span class="v">${fmtPrice(tr.ma200)}</span></div>
                <div class="detail-row"><span class="k">Distancia a máximo 52s</span><span class="v">${fmt(tr.pct_from_52w_high, 1)}%</span></div>

                <div class="section-subtitle">Gestión de riesgo</div>
                <div class="risk-grid">
                    <div class="kv"><span class="k">Entrada</span><span class="v">${fmtPrice(rm.entry_price)}</span></div>
                    <div class="kv"><span class="k">Stop Loss</span><span class="v sl">${fmtPrice(rm.sl)}</span></div>
                    <div class="kv"><span class="k">Riesgo</span><span class="v sl">${fmtPct(rm.risk_pct)}</span></div>
                    <div class="kv"><span class="k">Trailing salida</span><span class="v tp">${fmt(rm.trailing_stop_pct, 0)}%</span></div>
                </div>
                <div class="risk-explanation">${rm.sl_explanation || ''}<br>🎯 ${rm.exit_strategy || 'Dejar correr con trailing stop'}</div>
            </div>`;
    }

    loadDashboard();
    </script>
</body>
</html>
